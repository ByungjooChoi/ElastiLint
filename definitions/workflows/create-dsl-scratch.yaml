name: create-dsl-scratch
enabled: true
description: >-
  One-time setup. Creates the empty dsl-scratch index used by validate-querydsl for index-independent Query DSL validation. Safe to re-run.
triggers:
  - type: manual
steps:
  - name: create_scratch
    type: elasticsearch.request
    with:
      method: PUT
      path: /dsl-scratch
    on-failure:
      continue: true
